<!DOCTYPE html>
<html>

<head>

    <title>Edit Expense</title>

</head>

<body>

<h2>Edit Expense</h2>

<form method="POST">

<input
type="text"
name="title"
value="{{expense.title}}"
required>

<input
type="number"
step="0.01"
name="amount"
value="{{expense.amount}}"
required>

<input
type="text"
name="category"
value="{{expense.category}}"
required>

<button>Update</button>

</form>

</body>

</html>
