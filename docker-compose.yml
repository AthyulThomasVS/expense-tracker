version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: expense_db

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - expense-network


  flask:

    build: .

    container_name: expense-app

    ports:
      - "5000:5000"

    depends_on:
      - postgres

    networks:
      - expense-network


volumes:
  postgres-data:


networks:
  expense-network: